[theme]
primaryColor = "#0d9488"
backgroundColor = "#f4f7f6"
secondaryBackgroundColor = "#ffffff"
textColor = "#0f172a"
font = "sans serif"

[server]
headless = true
# Hugging Face Spaces / reverse proxies: browser uploads often fail with 403 (AxiosError) when
# XSRF cookies cannot be set or forwarded. Disabling is normal for public demo Spaces.
enableXsrfProtection = false
# WhatsApp / long clips (value is MB).
maxUploadSize = 500
